<div class="employee-detail-container" *ngIf="employee; else notFound">
  <mat-card>
    <mat-card-title>{{ employee.name }}</mat-card-title>
    <mat-card-content>
      <p><strong>Employee ID:</strong> {{ employee.id }}</p>
      <p><strong>Department:</strong> {{ employee.department }}</p>
      <p><strong>Role:</strong> {{ employee.role }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button routerLink="/employees">Back to Employees</button>
    </mat-card-actions>
  </mat-card>
</div>

<ng-template #notFound>
  <div class="employee-detail-container">
    <mat-card>
      <mat-card-title>Employee not found</mat-card-title>
      <mat-card-actions>
        <button mat-button routerLink="/employees">Back to Employees</button>
      </mat-card-actions>
    </mat-card>
  </div>
</ng-template>
